<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>排序大師 v0.1 - 基本演算法教學</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --tray-color: #34495e;
            --box-color: #f1c40f;
            --slot-color: #bdc3c7;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            touch-action: none; /* 防止瀏覽器預設滑動手勢 */
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 15px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            z-index: 10;
        }

        .panel {
            background: rgba(44, 62, 80, 0.9);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            pointer-events: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            pointer-events: auto;
            transition: 0.2s;
        }

        button:hover { background: #c0392b; }
        button:active { transform: scale(0.95); }

        #canvas-container {
            flex: 1;
            position: relative;
            cursor: grab;
        }

        canvas { display: block; width: 100%; height: 100%; }
        canvas:active { cursor: grabbing; }

        #intro-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }

        .modal {
            background: white; padding: 30px; border-radius: 15px; text-align: center; max-width: 500px;
            border-top: 5px solid var(--accent-color);
        }
    </style>
</head>
<body>

<div id="intro-overlay">
    <div class="modal">
        <h2 style="color: #2c3e50;">⚖️ 排序大師 v0.1</h2>
        <p>學習目標：資料比較與排序演算法</p>
        <div style="text-align: left; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            1. 畫面上方有 5 個重量未知的神秘方塊。<br>
            2. 將方塊拖曳至<b>天平</b>的左右托盤，觀察重量差異。<br>
            3. 找出順序，將方塊由<b>最輕 (左) 到最重 (右)</b> 放入下方的排序格中。<br>
            4. 電腦：左鍵拖曳方塊/背景，滾輪縮放。<br>
            5. 手機：單指拖曳方塊/背景，雙指縮放。
        </div>
        <button onclick="startGame()">開始挑戰</button>
    </div>
</div>

<div id="ui-layer">
    <div class="panel">
        <div style="font-size: 1.2em; font-weight: bold; margin-bottom: 5px;">⚖️ 排序大師</div>
        <div style="font-size: 0.9em; color: #bdc3c7;">比較次數：<span id="compare-count">0</span> 次</div>
    </div>
    <button onclick="verifySort()">驗證排序 ✅</button>
</div>

<div id="canvas-container">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const countEl = document.getElementById('compare-count');

// 遊戲世界設定
const WORLD_W = 1200;
const WORLD_H = 800;
let camera = { x: 0, y: 0, zoom: 1, isPanning: false, lastPos: {x:0, y:0}, lastDist: 0 };

// 遊戲狀態
let boxes = [];
let slots = [];
let scale = {
    x: WORLD_W / 2, y: 350,
    trayL: { box: null }, trayR: { box: null },
    tilt: 0, targetTilt: 0 // -1 左傾, 1 右傾, 0 平衡
};
let compareCount = 0;
let draggingBox = null;

// 初始化
function init() {
    window.addEventListener('resize', resize);
    resize();
    centerCamera();
    setupGameObjects();
    setupInputs();
    requestAnimationFrame(gameLoop);
}

function resize() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
}

function centerCamera() {
    camera.zoom = Math.min(canvas.width / WORLD_W, canvas.height / WORLD_H) * 0.95;
    camera.x = (canvas.width - WORLD_W * camera.zoom) / 2;
    camera.y = (canvas.height - WORLD_H * camera.zoom) / 2;
}

function startGame() {
    document.getElementById('intro-overlay').style.display = 'none';
}

function setupGameObjects() {
    const weights = [10, 20, 30, 40, 50];
    weights.sort(() => Math.random() - 0.5); // 隨機打亂重量

    const labels = ['A', 'B', 'C', 'D', 'E'];

    boxes = weights.map((w, i) => ({
        id: labels[i],
        weight: w,
        w: 60, h: 60,
        x: 300 + i * 150, y: 100,
        originX: 300 + i * 150, originY: 100,
        currentSlot: null
    }));

    for (let i = 0; i < 5; i++) {
        slots.push({ x: 250 + i * 140, y: 650, w: 80, h: 80, box: null });
    }
}

// --- 互動與輸入處理 ---
function setupInputs() {
    // 滾輪縮放
    canvas.addEventListener('wheel', (e) => {
        const zoomDelta = e.deltaY > 0 ? 0.9 : 1.1;
        camera.zoom = Math.max(0.3, Math.min(3, camera.zoom * zoomDelta));
    }, { passive: true });

    const getEvtPos = (e) => {
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX, y: t.clientY };
    };

    const getWorldPos = (screenX, screenY) => ({
        x: (screenX - camera.x) / camera.zoom,
        y: (screenY - camera.y) / camera.zoom
    });

    const onStart = (e) => {
        if (e.touches && e.touches.length === 2) {
            camera.lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            return;
        }

        const pos = getEvtPos(e);
        const wPos = getWorldPos(pos.x, pos.y);
        camera.lastPos = pos;

        // 檢查是否點擊方塊 (從後往前檢查，確保點到最上層)
        for (let i = boxes.length - 1; i >= 0; i--) {
            let b = boxes[i];
            if (wPos.x > b.x - b.w/2 && wPos.x < b.x + b.w/2 &&
                wPos.y > b.y - b.h/2 && wPos.y < b.y + b.h/2) {
                draggingBox = b;
                // 從原來的容器中移除
                if (b.currentSlot === 'trayL') scale.trayL.box = null;
                else if (b.currentSlot === 'trayR') scale.trayR.box = null;
                else if (typeof b.currentSlot === 'number') slots[b.currentSlot].box = null;
                
                b.currentSlot = null;
                updateScaleLogic();
                return;
            }
        }
        camera.isPanning = true;
    };

    const onMove = (e) => {
        if (e.touches && e.touches.length === 2) {
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            camera.zoom *= (dist / camera.lastDist);
            camera.lastDist = dist;
            return;
        }

        const pos = getEvtPos(e);
        if (draggingBox) {
            const dx = (pos.x - camera.lastPos.x) / camera.zoom;
            const dy = (pos.y - camera.lastPos.y) / camera.zoom;
            draggingBox.x += dx;
            draggingBox.y += dy;
        } else if (camera.isPanning) {
            camera.x += pos.x - camera.lastPos.x;
            camera.y += pos.y - camera.lastPos.y;
        }
        camera.lastPos = pos;
    };

    const onEnd = () => {
        if (draggingBox) {
            handleBoxDrop(draggingBox);
            draggingBox = null;
        }
        camera.isPanning = false;
    };

    canvas.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', onStart, {passive:false});
    window.addEventListener('touchmove', onMove, {passive:false});
    window.addEventListener('touchend', onEnd);
}

// --- 邏輯判斷 ---
function handleBoxDrop(box) {
    // 檢查是否掉入左托盤
    const trayLY = scale.y - 50 + (scale.tilt * 30);
    if (Math.abs(box.x - (scale.x - 200)) < 60 && Math.abs(box.y - trayLY) < 80 && !scale.trayL.box) {
        box.x = scale.x - 200; box.y = trayLY - 20;
        box.currentSlot = 'trayL';
        scale.trayL.box = box;
    } 
    // 檢查是否掉入右托盤
    else if (Math.abs(box.x - (scale.x + 200)) < 60 && Math.abs(box.y - (scale.y - 50 - (scale.tilt * 30))) < 80 && !scale.trayR.box) {
        box.x = scale.x + 200; box.y = scale.y - 50 - (scale.tilt * 30) - 20;
        box.currentSlot = 'trayR';
        scale.trayR.box = box;
    }
    else {
        // 檢查是否掉入排序格
        let placed = false;
        for (let i = 0; i < slots.length; i++) {
            if (Math.abs(box.x - slots[i].x) < 50 && Math.abs(box.y - slots[i].y) < 50 && !slots[i].box) {
                box.x = slots[i].x; box.y = slots[i].y;
                box.currentSlot = i;
                slots[i].box = box;
                placed = true;
                break;
            }
        }
        // 若都沒中，回到原點
        if (!placed) {
            box.x = box.originX; box.y = box.originY;
        }
    }
    updateScaleLogic();
}

function updateScaleLogic() {
    if (scale.trayL.box && scale.trayR.box) {
        compareCount++;
        countEl.innerText = compareCount;
        if (scale.trayL.box.weight > scale.trayR.box.weight) scale.targetTilt = -1;
        else if (scale.trayL.box.weight < scale.trayR.box.weight) scale.targetTilt = 1;
        else scale.targetTilt = 0;
    } else {
        if (scale.trayL.box) scale.targetTilt = -0.5;
        else if (scale.trayR.box) scale.targetTilt = 0.5;
        else scale.targetTilt = 0;
    }
}

function verifySort() {
    let isCorrect = true;
    let isFull = true;
    let currentWeight = -1;

    for (let i = 0; i < slots.length; i++) {
        if (!slots[i].box) {
            isFull = false;
            break;
        }
        if (slots[i].box.weight < currentWeight) {
            isCorrect = false;
        }
        currentWeight = slots[i].box.weight;
    }

    if (!isFull) {
        alert("⚠️ 請將所有 5 個方塊都放入下方的排序格中再進行驗證！");
    } else if (isCorrect) {
        alert(`🎉 恭喜過關！\n你使用了 ${compareCount} 次比較完成了排序！\n這就是演算法中「比較」與「交換」的魅力！`);
    } else {
        alert("❌ 順序有誤喔！請再利用天平比較看看，由最輕(左)排到最重(右)。");
    }
}

// --- 繪圖循環 ---
function gameLoop() {
    // 平滑更新天平傾斜角度
    scale.tilt += (scale.targetTilt - scale.tilt) * 0.1;

    // 若方塊在托盤上，跟隨托盤移動
    if (scale.trayL.box) {
        scale.trayL.box.x = scale.x - 200;
        scale.trayL.box.y = scale.y - 50 + (scale.tilt * 80) - 20;
    }
    if (scale.trayR.box) {
        scale.trayR.box.x = scale.x + 200;
        scale.trayR.box.y = scale.y - 50 - (scale.tilt * 80) - 20;
    }

    // 清除與重置畫布
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 套用相機變換
    ctx.translate(camera.x, camera.y);
    ctx.scale(camera.zoom, camera.zoom);

    // 繪製背景裝飾 (網格)
    ctx.strokeStyle = "rgba(189, 195, 199, 0.3)";
    ctx.lineWidth = 1;
    for(let i=0; i<WORLD_W; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,WORLD_H); ctx.stroke(); }
    for(let i=0; i<WORLD_H; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(WORLD_W,i); ctx.stroke(); }

    // 1. 繪製排序格
    ctx.fillStyle = "rgba(189, 195, 199, 0.5)";
    ctx.strokeStyle = "#7f8c8d";
    ctx.lineWidth = 3;
    slots.forEach((s, i) => {
        ctx.fillRect(s.x - s.w/2, s.y - s.h/2, s.w, s.h);
        ctx.strokeRect(s.x - s.w/2, s.y - s.h/2, s.w, s.h);
        ctx.fillStyle = "#7f8c8d";
        ctx.font = "20px Arial";
        ctx.textAlign = "center";
        ctx.fillText(`位置 ${i+1}`, s.x, s.y + 60);
        ctx.fillStyle = "rgba(189, 195, 199, 0.5)";
    });

    // 2. 繪製天平
    // 底座
    ctx.fillStyle = "#7f8c8d";
    ctx.beginPath();
    ctx.moveTo(scale.x, scale.y + 150);
    ctx.lineTo(scale.x - 40, scale.y + 250);
    ctx.lineTo(scale.x + 40, scale.y + 250);
    ctx.fill();
    ctx.fillRect(scale.x - 10, scale.y, 20, 150);

    // 橫樑與托盤 (旋轉)
    ctx.save();
    ctx.translate(scale.x, scale.y);
    ctx.rotate(scale.tilt * 0.4); // 控制最大旋轉角度
    
    // 樑
    ctx.fillStyle = "#2c3e50";
    ctx.fillRect(-220, -10, 440, 20);
    
    // 左托盤線與底
    ctx.strokeStyle = "#2c3e50";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-200, 10); ctx.lineTo(-240, 70); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-200, 10); ctx.lineTo(-160, 70); ctx.stroke();
    ctx.fillStyle = "#e74c3c";
    ctx.fillRect(-240, 70, 80, 10);
    
    // 右托盤線與底
    ctx.beginPath(); ctx.moveTo(200, 10); ctx.lineTo(160, 70); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(200, 10); ctx.lineTo(240, 70); ctx.stroke();
    ctx.fillRect(160, 70, 80, 10);
    
    // 支點標記
    ctx.fillStyle = "#e74c3c";
    ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // 3. 繪製方塊
    boxes.forEach(b => {
        // 陰影
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.fillRect(b.x - b.w/2 + 5, b.y - b.h/2 + 5, b.w, b.h);
        
        // 本體
        ctx.fillStyle = (b === draggingBox) ? "#f39c12" : "#f1c40f";
        ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
        ctx.strokeStyle = "#d35400";
        ctx.lineWidth = 4;
        ctx.strokeRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
        
        // 文字
        ctx.fillStyle = "#2c3e50";
        ctx.font = "bold 28px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(b.id, b.x, b.y);
    });

    requestAnimationFrame(gameLoop);
}

init();
</script>
</body>
</html>
